# ============================================
# 生产环境 Docker Compose
# 网络: hongyan-net
# MySQL 使用外部阿里云 RDS，不在本 compose 管理
# ============================================

version: "3.8"

services:
  # ---- Redis ----
  redis-server:
    image: redis:7-alpine
    container_name: breakup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hongyan-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- API 服务 ----
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
      target: runner
    container_name: breakup-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./packages/server/.env.production
    depends_on:
      redis-server:
        condition: service_healthy
    networks:
      - hongyan-net

volumes:
  redis_data:

networks:
  hongyan-net:
    name: hongyan-net
    external: false
